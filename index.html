  <link rel="manifest" href="manifest.json">

    :root {
      --bg-deep: #0f0f1a;
      --bg-card: #1a1a2e;
      --bg-card-hover: #222240;
      --bg-surface: #16162b;
      --text-primary: #e8e6f0;
      --text-secondary: #9896a8;
      --text-muted: #6b6980;
      --accent-teal: #2dd4a8;
      --accent-teal-dim: rgba(45, 212, 168, 0.12);
      --accent-amber: #f0a030;
      --accent-amber-dim: rgba(240, 160, 48, 0.12);
      --accent-coral: #e85454;
      --accent-coral-dim: rgba(232, 84, 84, 0.12);
      --accent-blue: #5b8dee;
      --accent-blue-dim: rgba(91, 141, 238, 0.12);
      --accent-purple: #9b7bea;
      --accent-purple-dim: rgba(155, 123, 234, 0.12);
      --border: rgba(255, 255, 255, 0.06);
      --radius: 12px;
      --radius-sm: 8px;
      --radius-xs: 6px;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-body: 'DM Sans', system-ui, sans-serif;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    
    body {
      font-family: var(--font-body);
      background: var(--bg-deep);
      color: var(--text-primary);
      min-height: 100vh;
      -webkit-font-smoothing: antialiased;
    }

    .app { max-width: 1200px; margin: 0 auto; padding: 20px 16px; }

    /* Header */
    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      padding: 24px 0 20px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 24px;
    }
    .header h1 {
      font-family: var(--font-display);
      font-size: 26px;
      font-weight: 700;
      letter-spacing: -0.5px;
      color: var(--text-primary);
    }
    .header .subtitle {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 4px;
    }
    .header .live-dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--accent-teal);
      border-radius: 50%;
      margin-right: 6px;
      animation: pulse 2s infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }
    .header .status {
      font-size: 12px;
      color: var(--accent-teal);
      display: flex;
      align-items: center;
      margin-top: 8px;
    }

    /* Navigation */
    .nav {
      display: flex;
      gap: 6px;
      margin-bottom: 24px;
      overflow-x: auto;
      padding-bottom: 4px;
    }
    .nav button {
      font-family: var(--font-body);
      font-size: 13px;
      font-weight: 500;
      padding: 8px 16px;
      border: 1px solid var(--border);
      border-radius: 20px;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      white-space: nowrap;
      transition: all 0.2s;
    }
    .nav button:hover { background: var(--bg-card); color: var(--text-primary); }
    .nav button.active {
      background: var(--accent-teal-dim);
      color: var(--accent-teal);
      border-color: rgba(45, 212, 168, 0.3);
    }

    /* Date selector */
    .date-bar {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }
    .date-bar input[type="date"] {
      font-family: var(--font-body);
      font-size: 14px;
      padding: 8px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      color: var(--text-primary);
      outline: none;
    }
    .date-bar .date-label {
      font-size: 14px;
      font-weight: 500;
      color: var(--text-secondary);
    }

    /* Metric Cards */
    .metrics {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
      gap: 12px;
      margin-bottom: 28px;
    }
    .metric-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 16px;
      position: relative;
      overflow: hidden;
    }
    .metric-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 3px;
    }
    .metric-card.teal::before { background: var(--accent-teal); }
    .metric-card.amber::before { background: var(--accent-amber); }
    .metric-card.coral::before { background: var(--accent-coral); }
    .metric-card.blue::before { background: var(--accent-blue); }
    .metric-card .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-muted);
      margin-bottom: 8px;
    }
    .metric-card .metric-value {
      font-family: var(--font-display);
      font-size: 28px;
      font-weight: 700;
      line-height: 1;
    }
    .metric-card .metric-sub {
      font-size: 12px;
      color: var(--text-muted);
      margin-top: 6px;
    }
    .metric-card.teal .metric-value { color: var(--accent-teal); }
    .metric-card.amber .metric-value { color: var(--accent-amber); }
    .metric-card.coral .metric-value { color: var(--accent-coral); }
    .metric-card.blue .metric-value { color: var(--accent-blue); }

    /* Section */
    .section {
      margin-bottom: 28px;
    }
    .section-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
    }
    .section-title {
      font-size: 16px;
      font-weight: 600;
      color: var(--text-primary);
    }
    .section-count {
      font-size: 12px;
      color: var(--text-muted);
      background: var(--bg-card);
      padding: 4px 10px;
      border-radius: 12px;
    }

    /* Follow-up Cards */
    .followup-grid {
      display: grid;
      gap: 10px;
    }
    .followup-card {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 14px 16px;
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      transition: background 0.2s;
      cursor: pointer;
    }
    .followup-card:hover { background: var(--bg-card-hover); }
    .followup-card .firm-name {
      font-size: 14px;
      font-weight: 600;
      margin-bottom: 3px;
    }
    .followup-card .firm-detail {
      font-size: 12px;
      color: var(--text-secondary);
      line-height: 1.5;
    }
    .followup-card .firm-contact {
      font-size: 12px;
      color: var(--accent-blue);
      margin-top: 2px;
    }
    .tag {
      display: inline-block;
      font-size: 11px;
      font-weight: 600;
      padding: 3px 10px;
      border-radius: 12px;
      white-space: nowrap;
    }
    .tag-followup { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .tag-negative { background: var(--accent-coral-dim); color: var(--accent-coral); }
    .tag-positive { background: var(--accent-teal-dim); color: var(--accent-teal); }
    .tag-info { background: var(--accent-blue-dim); color: var(--accent-blue); }

    /* Attendance Table */

      overflow-x: auto;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--bg-card);
    }
    .att-table {
      width: 100%;
      border-collapse: collapse;
      font-size: 13px;
      min-width: 700px;
    }
    .att-table th {
      text-align: left;
      padding: 12px 14px;
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: var(--text-muted);
      border-bottom: 1px solid var(--border);
      background: var(--bg-surface);
    }
    .att-table td {
      padding: 12px 14px;
      border-bottom: 1px solid var(--border);
      color: var(--text-secondary);
    }

    .att-table tr:hover td { background: rgba(255,255,255,0.02); }

      align-items: center;
      gap: 10px;

      height: 30px;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-weight: 700;
      flex-shrink: 0;
    }
    .person-name {
      font-weight: 500;
      color: var(--text-primary);
    }
    .badge {

      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 4px;

    .badge-no { background: var(--accent-coral-dim); color: var(--accent-coral); }
    .badge-match { background: var(--accent-teal-dim); color: var(--accent-teal); }
    .badge-mismatch { background: var(--accent-amber-dim); color: var(--accent-amber); }
    .num-highlight { font-weight: 600; color: var(--text-primary); font-size: 15px; }

    /* Visit Chart */
    .chart-container {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);

    .chart-legend {

      gap: 20px;
      margin-bottom: 16px;

    .person-card {

      border: 1px solid var(--border);
      border-radius: var(--radius);

      padding: 4px 0;
      font-size: 12px;
      color: var(--text-secondary);
    }
    .person-card-stat .val { font-weight: 600; color: var(--text-primary); }

    /* Filters */
    .filters {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      margin-bottom: 16px;
    }
    .filter-chip {
      font-family: var(--font-body);
      font-size: 12px;
      padding: 6px 12px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 16px;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.2s;
    }
    .filter-chip:hover, .filter-chip.active {
      background: var(--accent-purple-dim);
      color: var(--accent-purple);
      border-color: rgba(155, 123, 234, 0.3);

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 48px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .empty-state .icon { font-size: 32px; margin-bottom: 12px; opacity: 0.5; }

    /* Loading */
    .loading {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 60px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid var(--border);
      border-top-color: var(--accent-teal);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin-right: 10px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Animations */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .fade-up { animation: fadeUp 0.4s ease-out both; }
    .delay-1 { animation-delay: 0.05s; }
    .delay-2 { animation-delay: 0.1s; }
    .delay-3 { animation-delay: 0.15s; }
    .delay-4 { animation-delay: 0.2s; }

    /* Responsive */
    @media (max-width: 600px) {
      .header h1 { font-size: 22px; }
      .metrics { grid-template-columns: repeat(2, 1fr); }
      .metric-card .metric-value { font-size: 24px; }
      .person-grid { grid-template-columns: 1fr; }
    }

    /* Scrollbar */
    ::-webkit-scrollbar { width: 6px; height: 6px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.1); border-radius: 3px; }
  </style>
</head>

};

// ============================================
// DATA FETCHING
// ============================================
async function fetchSheet(sheetName) {
  const url = `https://sheets.googleapis.com/v4/spreadsheets/${SPREADSHEET_ID}/values/${encodeURIComponent(sheetName)}?key=${SHEETS_API_KEY}`;
  try {
    const res = await fetch(url);
    const data = await res.json();
    if (!data.values || data.values.length < 2) return [];
    const headers = data.values[0];
    return data.values.slice(1).map(row => {
      const obj = {};
      headers.forEach((h, i) => { obj[h.trim()] = (row[i] || '').trim(); });
      return obj;
    });
  } catch (e) {
    console.error(`Failed to fetch ${sheetName}:`, e);
    return [];
  }
}

async function fetchAllData() {
  const [morning, visit, evening, attendance, clients] = await Promise.all([
    fetchSheet(SHEET_NAMES.morning),
    fetchSheet(SHEET_NAMES.visit),
    fetchSheet(SHEET_NAMES.evening),
    fetchSheet(SHEET_NAMES.attendance),
    fetchSheet(SHEET_NAMES.masterClient)
  ]);
  return { morning, visit, evening, attendance, clients };
}

// ============================================
// RENDERING
// ============================================
const COLORS = [
  { bg: 'rgba(45, 212, 168, 0.15)', text: '#2dd4a8' },
  { bg: 'rgba(91, 141, 238, 0.15)', text: '#5b8dee' },
  { bg: 'rgba(155, 123, 234, 0.15)', text: '#9b7bea' },
  { bg: 'rgba(240, 160, 48, 0.15)', text: '#f0a030' },
  { bg: 'rgba(232, 84, 84, 0.15)', text: '#e85454' },
];

function getInitials(name) {
  return name.split(/[\s.]+/).filter(Boolean).map(w => w[0]).slice(0, 2).join('').toUpperCase();
}

function classifyComment(comment) {
  if (!comment) return 'info';
  const c = comment.toLowerCase();
  if (c.includes('not interested') || c.includes('not allowed') || c.includes('not available') || c.includes('not reachable')) return 'negative';
  if (c.includes('order') || c.includes('confirmed') || c.includes('placed') || c.includes('given')) return 'positive';
  if (c.includes('next') || c.includes('again') || c.includes('follow') || c.includes('week') || c.includes('interest') || c.includes('meet') || c.includes('appointment') || c.includes('discuss')) return 'followup';
  return 'info';
}

function getTagClass(type) {
  const map = { negative: 'tag-negative', positive: 'tag-positive', followup: 'tag-followup', info: 'tag-info' };
  return map[type] || 'tag-info';
}

let currentTab = 'followups';
let data = null;

function getTodayStr() {
  const now = new Date();
  return now.getDate() + '/' + (now.getMonth() + 1) + '/' + now.getFullYear();
}

function filterToday(arr, dateField = 'Date') {
  const today = getTodayStr();
  return arr.filter(r => r[dateField] === today);
}

function render() {
  const app = document.getElementById('app');
  const todayAttendance = filterToday(data.attendance);
  const todayVisits = filterToday(data.visit);
  const todayMorning = filterToday(data.morning);
  const todayEvening = filterToday(data.evening);

  const totalVisits = todayVisits.length;
  const activeMembers = todayAttendance.filter(a => a['Morning Report'] === '✅').length;
  const totalMembers = 5;
  const eveningSent = todayAttendance.filter(a => a['Evening report'] === '✅').length;
  const mismatches = todayAttendance.filter(a => a.Match === '❌').length;

  const followups = data.clients.filter(c => classifyComment(c.Comment) === 'followup');
  const negatives = data.clients.filter(c => classifyComment(c.Comment) === 'negative');
  const positives = data.clients.filter(c => classifyComment(c.Comment) === 'positive');

  app.innerHTML = `
    <header class="header fade-up">
      <div>
        <h1>Eat Snaac</h1>
        <div class="subtitle">Field team performance tracker</div>
        <div class="status"><span class="live-dot"></span>Live — syncing from sheets</div>
      </div>
    </header>

    <nav class="nav fade-up delay-1">
      <button class="${currentTab === 'followups' ? 'active' : ''}" onclick="switchTab('followups')">Follow-ups</button>
      <button class="${currentTab === 'visits' ? 'active' : ''}" onclick="switchTab('visits')">Visits</button>
      <button class="${currentTab === 'attendance' ? 'active' : ''}" onclick="switchTab('attendance')">Attendance</button>
      <button class="${currentTab === 'clients' ? 'active' : ''}" onclick="switchTab('clients')">All clients</button>
    </nav>

    <div class="metrics fade-up delay-2">
      <div class="metric-card amber">
        <div class="metric-label">Pending follow-ups</div>
        <div class="metric-value">${followups.length}</div>
        <div class="metric-sub">${positives.length} orders confirmed</div>
      </div>
      <div class="metric-card teal">
        <div class="metric-label">Visits today</div>
        <div class="metric-value">${totalVisits}</div>
        <div class="metric-sub">Avg ${totalVisits > 0 && activeMembers > 0 ? (totalVisits / activeMembers).toFixed(1) : 0} per person</div>
      </div>
      <div class="metric-card blue">
        <div class="metric-label">Active today</div>
        <div class="metric-value">${activeMembers}<span style="font-size:16px;color:var(--text-muted)">/${totalMembers}</span></div>
        <div class="metric-sub">${eveningSent} evening reports in</div>
      </div>
      <div class="metric-card coral">
        <div class="metric-label">Mismatches</div>
        <div class="metric-value">${mismatches}</div>
        <div class="metric-sub">${mismatches > 0 ? 'Needs attention' : 'All clear'}</div>
      </div>
    </div>

    <div id="tab-content" class="fade-up delay-3"></div>
  `;

  renderTab();
}

function switchTab(tab) {
  currentTab = tab;
  renderTab();
  document.querySelectorAll('.nav button').forEach(b => {
    b.classList.toggle('active', b.textContent.toLowerCase().replace('-', '') === tab);
  });
}

function renderTab() {
  const container = document.getElementById('tab-content');
  if (!container) return;

  switch (currentTab) {
    case 'followups': renderFollowups(container); break;
    case 'visits': renderVisits(container); break;
    case 'attendance': renderAttendance(container); break;
    case 'clients': renderClients(container); break;
  }
}

function renderFollowups(el) {
  const followups = data.clients.filter(c => classifyComment(c.Comment) === 'followup');
  const negatives = data.clients.filter(c => classifyComment(c.Comment) === 'negative');
  const positives = data.clients.filter(c => classifyComment(c.Comment) === 'positive');

  el.innerHTML = `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Pending follow-ups</div>
        <span class="section-count">${followups.length} firms</span>
      </div>
      <div class="followup-grid">
        ${followups.map(f => renderFirmCard(f, 'followup')).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Orders confirmed</div>
        <span class="section-count">${positives.length} firms</span>
      </div>
      <div class="followup-grid">
        ${positives.length > 0 ? positives.map(f => renderFirmCard(f, 'positive')).join('') : '<div class="empty-state">No confirmed orders yet</div>'}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Not interested / rejected</div>
        <span class="section-count">${negatives.length} firms</span>
      </div>
      <div class="followup-grid">
        ${negatives.length > 0 ? negatives.map(f => renderFirmCard(f, 'negative')).join('') : '<div class="empty-state">None</div>'}
      </div>
    </div>
  `;
}

function renderFirmCard(f, type) {
  const tagClass = getTagClass(type);
  const tagLabels = { followup: 'follow up', negative: 'not interested', positive: 'order confirmed', info: 'info' };
  return `
    <div class="followup-card">
      <div>
        <div class="firm-name">${f['Firm Name'] || '—'}</div>
        <div class="firm-detail">${f['Contact Person'] || ''} ${f.Address ? '· ' + f.Address : ''} ${f.Town ? '· ' + f.Town : ''}</div>
        ${f.Mobile ? `<div class="firm-contact">${f.Mobile}</div>` : ''}
        <div style="margin-top:6px"><span class="tag ${tagClass}">${f.Comment || tagLabels[type]}</span></div>
      </div>
      <div style="text-align:right;flex-shrink:0;margin-left:12px">
        <div style="font-size:11px;color:var(--text-muted)">${f['Last Visited Date'] || ''}</div>
        <div style="font-size:11px;color:var(--text-secondary);margin-top:2px">${f['Last Visited By'] || ''}</div>
      </div>
    </div>
  `;
}

function renderVisits(el) {
  const todayVisits = filterToday(data.visit);
  const todayAttendance = filterToday(data.attendance);

  const personMap = {};
  todayVisits.forEach(v => {
    const id = v['Telegram ID'];
    if (!personMap[id]) personMap[id] = { visits: [], name: '' };
    personMap[id].visits.push(v);
  });
  todayAttendance.forEach(a => {
    const id = a['Telegram ID'];
    if (personMap[id]) personMap[id].name = a.Name || a.personName;
  });

  const persons = Object.entries(personMap);

  el.innerHTML = `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Today's visits by person</div>
        <span class="section-count">${todayVisits.length} total</span>
      </div>
      <div class="person-grid">
        ${persons.map(([id, p], i) => {
          const color = COLORS[i % COLORS.length];
          return `
            <div class="person-card">
              <div class="person-card-header">
                <div class="avatar" style="background:${color.bg};color:${color.text}">${getInitials(p.name || 'UN')}</div>
                <div>
                  <div class="person-card-name">${p.name || 'ID: ' + id}</div>
                  <div class="person-card-role">${p.visits.length} visits today</div>
                </div>
              </div>
              ${p.visits.map(v => `
                <div class="person-card-stat">
                  <span>${v['Firm Name']}</span>
                  <span class="val">${v.Time || ''}</span>
                </div>
              `).join('')}
            </div>
          `;
        }).join('')}
      </div>
    </div>

    <div class="section">
      <div class="section-header">
        <div class="section-title">Visits this week</div>
      </div>
      <div class="chart-container">
        <div class="chart-legend">
          <span><span class="legend-dot" style="background:var(--accent-teal)"></span>Selfie visits</span>
          <span><span class="legend-dot" style="background:var(--accent-purple)"></span>Reported visits</span>
        </div>
        <div class="chart-wrap"><canvas id="visitChart"></canvas></div>
      </div>
    </div>
  `;

  const names = todayAttendance.map(a => (a.Name || a.personName || '').split(' ')[0]);
  const selfies = todayAttendance.map(a => parseInt(a['Selfie visits']) || 0);
  const reported = todayAttendance.map(a => parseInt(a['Report Visits']) || 0);

  if (document.getElementById('visitChart')) {
    new Chart(document.getElementById('visitChart'), {
      type: 'bar',
      data: {
        labels: names,
        datasets: [
          { label: 'Selfie', data: selfies, backgroundColor: '#2dd4a8', borderRadius: 6, barPercentage: 0.6 },
          { label: 'Reported', data: reported, backgroundColor: '#9b7bea', borderRadius: 6, barPercentage: 0.6 }
        ]
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        plugins: { legend: { display: false } },
        scales: {
          x: { grid: { display: false }, ticks: { color: '#6b6980', font: { size: 12 } } },
          y: { grid: { color: 'rgba(255,255,255,0.04)' }, ticks: { color: '#6b6980', stepSize: 1 }, beginAtZero: true }
        }
      }
    });
  }
}

function renderAttendance(el) {
  const todayAtt = filterToday(data.attendance);

  el.innerHTML = `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Today's attendance</div>

      </div>

                  <td><span class="num-highlight">${a['Selfie visits'] || '0'}</span></td>
                  <td><span class="num-highlight">${a['Report Visits'] || '0'}</span></td>
                  <td><span class="badge ${a.Match === '✅' ? 'badge-match' : a.Match === '❌' ? 'badge-mismatch' : ''}">${a.Match === '✅' ? 'match' : a.Match === '❌' ? 'mismatch' : '—'}</span></td>
                  <td><span class="badge ${a['Evening report'] === '✅' ? 'badge-yes' : 'badge-no'}">${a['Evening report'] === '✅' ? 'sent' : 'missing'}</span></td>
                </tr>
              `;

          </tbody>
        </table>
      </div>
    </div>
  `;
}

function renderClients(el) {
  const allClients = data.clients;
  const types = ['all', 'followup', 'positive', 'negative', 'info'];

  el.innerHTML = `
    <div class="section">
      <div class="section-header">
        <div class="section-title">Master client list</div>
        <span class="section-count">${allClients.length} firms</span>
      </div>
      <div class="filters" id="clientFilters">
        ${types.map(t => `<button class="filter-chip ${t === 'all' ? 'active' : ''}" data-filter="${t}">${t === 'all' ? 'All' : t === 'followup' ? 'Follow-up' : t === 'positive' ? 'Confirmed' : t === 'negative' ? 'Rejected' : 'Other'}</button>`).join('')}
      </div>
      <div class="followup-grid" id="clientList">
        ${allClients.map(f => renderFirmCard(f, classifyComment(f.Comment))).join('')}
      </div>
    </div>
  `;

  document.getElementById('clientFilters').addEventListener('click', e => {
    if (!e.target.classList.contains('filter-chip')) return;
    document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
    e.target.classList.add('active');
    const filter = e.target.dataset.filter;
    const filtered = filter === 'all' ? allClients : allClients.filter(f => classifyComment(f.Comment) === filter);
    document.getElementById('clientList').innerHTML = filtered.length > 0
      ? filtered.map(f => renderFirmCard(f, classifyComment(f.Comment))).join('')
      : '<div class="empty-state">No firms in this category</div>';
  });
}
